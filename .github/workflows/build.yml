name: Compile ESP32 CYD HelloRadio

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 board package v2.0.17
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17

      - name: Install TFT_eSPI library
        run: arduino-cli lib install "TFT_eSPI"

      - name: Install ESP32-audioI2S library (manual)
        run: |
          git clone https://github.com/schreibfaul1/ESP32-audioI2S.git \
            ~/Arduino/libraries/ESP32-audioI2S

      - name: Write CYD User_Setup.h into TFT_eSPI
        run: |
          LIB_PATH=$(arduino-cli lib list | grep TFT_eSPI | awk '{print $NF}')
          if [ -z "$LIB_PATH" ]; then
            LIB_PATH=$(find ~/Arduino/libraries -maxdepth 1 -name "TFT_eSPI*" -type d | head -1)
          fi
          echo "TFT_eSPI found at: $LIB_PATH"

          cat > "$LIB_PATH/User_Setup.h" << 'SETUP'
          #define ILI9341_DRIVER
          #define TFT_WIDTH  240
          #define TFT_HEIGHT 320

          #define TFT_MISO 12
          #define TFT_MOSI 13
          #define TFT_SCLK 14
          #define TFT_CS   15
          #define TFT_DC    2
          #define TFT_RST  -1
          #define TFT_BL   21

          #define LOAD_GLCD
          #define LOAD_FONT2
          #define LOAD_FONT4
          #define LOAD_FONT6
          #define LOAD_FONT7
          #define LOAD_FONT8
          #define LOAD_GFXFF
          #define SMOOTH_FONT

          #define SPI_FREQUENCY       27000000
          #define SPI_READ_FREQUENCY  20000000
          SETUP

      - name: Compile sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --libraries ~/Arduino/libraries \
            "Examples/Basics/7-HelloRadio/7-HelloRadio.ino" \
            --output-dir build/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: HelloRadio-firmware
          path: build/
          retention-days: 30
